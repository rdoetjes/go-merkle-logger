syntax = "proto3";

package merkle.logging;

option go_package = "phonax.com/merkle/proto;proto";

import "google/protobuf/timestamp.proto";

message LogRequest {
  string application = 1;
  string level = 2;
  string message = 3;
  map<string, string> fields = 4;
}

message LogResponse {
  bool ok = 1;
  string error = 2;
}

message VerifyRequest {
  int64 start_sequence = 1;
  int64 end_sequence = 2;
}

message VerifyResponse {
  bool ok = 1;
  string error = 2;
}

service Logger {
  rpc Write(LogRequest) returns (LogResponse);
  rpc Verify(VerifyRequest) returns (VerifyResponse);
}
