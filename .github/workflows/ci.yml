name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    #runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v4

      - name: Check for leaks in the code
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y gitleaks
          gitleaks detect --source $GITHUB_WORKSPACE --log-opts="-p -n 1"

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Generate protobuf code (debug)
        run: |
          # Debug: show repo root and proto dir contents
          echo "PWD: $(pwd)"
          echo "Listing repo root:"
          ls -la
          echo "Listing proto dir if exists:"
          ls -la proto || true
          echo "Finding proto files:"
          find proto -name '*.proto' -print || true

          # Install protoc compiler
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          # Ensure GOPATH/bin is in PATH so installed protoc-gen-* are discoverable
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Install codegen plugins and generate code via Makefile target
          make proto

      - name: Run tests
        run: go test -v ./...

  build_artifacts:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Load .env variables
        run: |
          export $(cat ~/actions-runner/.env | xargs)
          env

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Ensure protoc-gen plugins
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make install-proto-tools

      - name: Generate proto files
        run: make proto

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          DIST: dist/${{ matrix.os }}/${{ matrix.arch }}
        run: |
          echo "Building for $GOOS/$GOARCH to be stored in $DIST/"
          mkdir -p $DIST
          # disable cgo for cross-compilation
          export CGO_ENABLED=0
          # set output names (windows needs .exe)
          if [ "$GOOS" = "windows" ]; then
            srv=$DIST/merkle-server.exe
            cli=$DIST/merkle-client.exe
            chk=$DIST/merkle-checker.exe
            ben=$DIST/merkle-bench.exe
          else
            srv=$DIST/merkle-server
            cli=$DIST/merkle-client
            chk=$DIST/merkle-checker
            ben=$DIST/merkle-bench
          fi

          echo "→ Building server..."
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$srv" ./cmd/server

          echo "→ Building client..."
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$cli" ./cmd/client

          echo "→ Building checker..."
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$chk" ./cmd/checker

          echo "→ Building bench..."
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$ben" ./cmd/bench

          # Optional: list what actually got built
          echo "Built files in $DIST:"
          ls -l "$DIST/" || echo "DIST directory is empty!"

      - name: Package artifacts
        run: |
          mkdir -p out
          tarfile=out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          tar -czf "$tarfile" -C $DIST/
          echo "packaged $tarfile"

      - name: Store artifacts in Artifactory
        run: |
          set -euo pipefail

          MD5=$(md5sum "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" | awk '{print $1}')
          SHA1=$(sha1sum "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" | awk '{print $1}')

          echo "checksum for: merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz $MD5 $SHA1"

          pass=$(curl --fail -s -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN }}" "${{ vars.VAULT_ADDR }}/v1/kv/data/prod/artifactory/ci" | jq -r '.data.data.password')
          iso=$(date +%Y%m%d%H%M)

          curl --fail-with-body -s -u "ci:$pass" \
            -X PUT \
            -T "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            -H "X-Checksum-Md5: $MD5" \
            -H "X-Checksum-Sha1: $SHA1" \
            "https://stratos01.phonax.com/artifactory/internal_test/merkel/$GITHUB_SHA/merkle-${{ matrix.os }}-${{ matrix.arch }}-$iso.tar.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merkle-${{ matrix.os }}-${{ matrix.arch }}
          path: out/merkle-${{ matrix.os }}-${{ matrix.arch }}.*
