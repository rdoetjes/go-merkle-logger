name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Generate protobuf code
        run: |
          # Install protoc compiler
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          # Ensure GOPATH/bin is in PATH so installed protoc-gen-* are discoverable
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Install codegen plugins and generate code via Makefile target
          make proto

      - name: Run tests
        run: go test -v ./...

  build_artifacts:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Ensure protoc-gen plugins
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make install-proto-tools

      - name: Generate proto files
        run: make proto

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          echo "Building for $GOOS/$GOARCH"
          mkdir -p dist
          # build each cmd
          GOOS=$GOOS GOARCH=$GOARCH go build -o dist/merkle-server-${{ matrix.os }}-${{ matrix.arch }} ./cmd/server
          GOOS=$GOOS GOARCH=$GOARCH go build -o dist/merkle-client-${{ matrix.os }}-${{ matrix.arch }} ./cmd/client
          GOOS=$GOOS GOARCH=$GOARCH go build -o dist/merkle-checker-${{ matrix.os }}-${{ matrix.arch }} ./cmd/checker
          GOOS=$GOOS GOARCH=$GOARCH go build -o dist/merkle-bench-${{ matrix.os }}-${{ matrix.arch }} ./cmd/bench

      - name: Package artifacts
        run: |
          mkdir -p out
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -j out/merkle-${{ matrix.os }}-${{ matrix.arch }}.zip dist/*${{ matrix.os }}-${{ matrix.arch }}*
            echo "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.zip" > artifact-path.txt
          else
            tar -C dist -czf out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ./*${{ matrix.os }}-${{ matrix.arch }}*
            echo "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" > artifact-path.txt
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merkle-${{ matrix.os }}-${{ matrix.arch }}
          path: out/merkle-${{ matrix.os }}-${{ matrix.arch }}.*
