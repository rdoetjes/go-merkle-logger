name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Generate protobuf code
        run: |
          # Install protoc compiler
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          # Ensure GOPATH/bin is in PATH so installed protoc-gen-* are discoverable
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Install codegen plugins and generate code via Makefile target
          make proto

      - name: Run tests
        run: go test -v ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage.out
          path: coverage.out
