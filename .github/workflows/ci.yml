name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    #runs-on: ubuntu-latest
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Generate protobuf code (debug)
        run: |
          # Debug: show repo root and proto dir contents
          echo "PWD: $(pwd)"
          echo "Listing repo root:"
          ls -la
          echo "Listing proto dir if exists:"
          ls -la proto || true
          echo "Finding proto files:"
          find proto -name '*.proto' -print || true

          # Install protoc compiler
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          # Ensure GOPATH/bin is in PATH so installed protoc-gen-* are discoverable
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Install codegen plugins and generate code via Makefile target
          make proto

      - name: Run tests
        run: go test -v ./...

  build_artifacts:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Ensure protoc-gen plugins
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make install-proto-tools

      - name: Generate proto files
        run: make proto

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          echo "Building for $GOOS/$GOARCH"
          mkdir -p dist
          # disable cgo for cross-compilation
          export CGO_ENABLED=0
          # set output names (windows needs .exe)
          if [ "$GOOS" = "windows" ]; then
            srv=dist/merkle-server-${GOOS}-${GOARCH}.exe
            cli=dist/merkle-client-${GOOS}-${GOARCH}.exe
            chk=dist/merkle-checker-${GOOS}-${GOARCH}.exe
            ben=dist/merkle-bench-${GOOS}-${GOARCH}.exe
          else
            srv=dist/merkle-server-${GOOS}-${GOARCH}
            cli=dist/merkle-client-${GOOS}-${GOARCH}
            chk=dist/merkle-checker-${GOOS}-${GOARCH}
            ben=dist/merkle-bench-${GOOS}-${GOARCH}
          fi
          # build each cmd; ignore failures for optional targets
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$srv" ./cmd/server || echo "build server failed"
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$cli" ./cmd/client || echo "build client failed"
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$chk" ./cmd/checker || echo "build checker failed"
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$ben" ./cmd/bench || echo "build bench failed"

      - name: Package artifacts
        run: |
          mkdir -p out
          # collect matching files
          matches=()
          for f in dist/*${{ matrix.os }}-${{ matrix.arch }}*; do
            if [ -e "$f" ]; then
              matches+=("$f")
            fi
          done
          if [ ${#matches[@]} -eq 0 ]; then
            echo "no artifacts built for ${{ matrix.os }}-${{ matrix.arch }}"
            exit 0
          fi
          echo "found files: ${matches[*]}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            zipfile=out/merkle-${{ matrix.os }}-${{ matrix.arch }}.zip
            zip -j "$zipfile" "${matches[@]}"
            echo "packaged $zipfile"
          else
            tarfile=out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            tar -czf "$tarfile" -C dist "${matches[@]##dist/}"
            echo "packaged $tarfile"
          fi

      - name: Store artifacts in Artifactory
        run: |
          MD5=$(md5sum "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" | awk '{print $1}')
          SHA1=$(sha1sum "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" | awk '{print $1}')

          $pass=$(curl -s \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/kv/data/prod/artifactory/ci" \
          | jq -r '.data.data.password')

          curl -u "ci:$pass" \
            -X PUT \
            -T "out/merkle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            -H "X-Checksum-Md5: $MD5" \
            -H "X-Checksum-Sha1: $SHA1" \
            "https://stratos01.phonax.com/artifactory/internal_test/merkle/$1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merkle-${{ matrix.os }}-${{ matrix.arch }}
          path: out/merkle-${{ matrix.os }}-${{ matrix.arch }}.*
